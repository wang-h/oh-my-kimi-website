      <section class="hero">
        <div>
          <span class="badge">集成</span>
          <h1>把 CLI 接到你的其他工作流里。</h1>
          <p>把公开站点重点放在集成故事上：MCP、通知和外部工作流接入。</p>
        </div>

      <section class="section grid">
        <article class="card">
          <h3>MCP</h3>
          <p>当你想让 CLI 和外部工具 / 服务结构化通信时，用 MCP。</p>
        </article>
        <article class="card">
          <h3>通知</h3>
          <p>给长流程接上提醒，这样任务完成或需要注意时你能及时知道。</p>
        </article>
        <article class="card">
          <h3>GitHub 工作流</h3>
          <p>把 CLI 仓库和网站仓库链接起来，方便文档和公开站点一起更新。</p>
        </article>
      </section>

      <section class="section card">
